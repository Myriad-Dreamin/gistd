name: gistd::site_health

on:
  schedule:
    # GitHub Actions schedules use UTC. Run every 3 hours.
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - https://gistd.myriad-dreamin.com/
          - https://gistd-cn.myriad-dreamin.com/
    steps:
      - name: Check ${{ matrix.site }}
        run: |
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "${{ matrix.site }}" \
            --output /dev/null
